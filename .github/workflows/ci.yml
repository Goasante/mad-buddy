name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Environment preflight (structure only, no secrets required)
        run: node scripts/preflight.mjs || true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests (privacy + route protection)
        run: npm test

      - name: Production build
        run: npm run build
        env:
          # Build must succeed without real secrets; routes degrade to their
          # "not configured" responses when Supabase/Paystack env is absent.
          NEXT_PUBLIC_APP_URL: http://localhost:3000
